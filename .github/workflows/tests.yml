name: CI

on: [push, pull_request]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff
        run: ruff check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  notebooks:
    name: Validate notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nbformat
        run: pip install "nbformat>=5.10"

      - name: Check all notebooks are valid
        run: |
          python - <<'EOF'
          import glob, nbformat, sys
          errors = []
          for path in sorted(glob.glob("notebooks/**/*.ipynb", recursive=True)):
              try:
                  with open(path) as f:
                      nbformat.read(f, as_version=4)
              except Exception as exc:
                  errors.append(f"{path}: {exc}")
          if errors:
              print("Invalid notebooks:")
              print("\n".join(errors))
              sys.exit(1)
          print(f"All {len(glob.glob('notebooks/**/*.ipynb', recursive=True))} notebooks are valid.")
          EOF
